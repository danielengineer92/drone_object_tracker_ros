# Parameters for vision mode (real camera, no drone connection)

camera_node:
  ros__parameters:
    camera_index: 0
    frame_width: 640
    frame_height: 480
    fps: 30.0
    reconnect_interval: 3.0
    max_reconnect_attempts: 10
    camera_backend: "v4l2"

yolo_node:
  ros__parameters:
    model_path: "yolov8n.pt"
    confidence_threshold: 0.5
    iou_threshold: 0.45
    device: "cpu"
    input_size: 640
    max_detections: 20
    half_precision: false
    verbose: false

tracker_node:
  ros__parameters:
    target_class: "person"
    min_confidence: 0.4
    detection_timeout: 2.0
    reacquisition_timeout: 5.0
    smoothing_alpha: 0.4
    target_area_min: 0.001
    target_area_max: 0.8
    publish_rate: 30.0
    proximity_threshold: 0.15

control_node:
  ros__parameters:
    autonomous_enabled: false
    gain_forward: 1.0
    gain_right: 0.8
    gain_down: 0.5
    gain_yaw: 0.6
    deadband_x: 0.05
    deadband_y: 0.05
    max_velocity_forward: 2.0
    max_velocity_right: 2.0
    max_velocity_down: 1.0
    max_yaw_rate: 1.0
    rate_limit: 0.3
    min_battery_percent: 20.0
    require_gps: false
    require_armed: false
    control_rate: 20.0
    target_timeout: 3.0

fake_telemetry_node:
  ros__parameters:
    publish_rate: 10.0
    simulate_armed: false
    simulate_flying: false
    initial_battery_percent: 100.0
    battery_drain_rate: 0.0
    flight_mode: "MANUAL"
    gps_satellites: 0
    simulate_gps_noise: false

visualizer_node:
  ros__parameters:
    window_name: "Drone Vision System (VISION MODE)"
    display_width: 960
    display_height: 720
    show_detections: true
    show_tracking: true
    show_telemetry: true
    show_control: true
    display_fps: 30.0
    headless: false
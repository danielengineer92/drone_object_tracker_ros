# Parameters for simulation mode (no hardware required)

fake_camera_node:
  ros__parameters:
    image_topic: "/camera/image_raw"
    frame_id: "camera_optical_frame"
    frame_width: 640
    frame_height: 480
    fps: 30.0
    target_type: "person_like"
    motion_pattern: "sinusoidal"
    motion_speed: 0.8
    add_noise: true
    noise_level: 8

fake_detection_node:
  ros__parameters:
    detections_topic: "/detections"
    publish_rate: 15.0
    target_class: "person"
    target_class_id: 0
    base_confidence: 0.82
    confidence_noise: 0.08
    motion_pattern: "sinusoidal"
    motion_speed: 0.8
    image_width: 640
    image_height: 480
    detection_dropout_rate: 0.05
    add_false_detections: true
    false_detection_rate: 0.08

fake_telemetry_node:
  ros__parameters:
    telemetry_topic: "/drone/telemetry"
    publish_rate: 10.0
    simulate_armed: false
    simulate_flying: false
    initial_battery_percent: 78.0
    battery_drain_rate: 0.005
    base_latitude: 47.3769
    base_longitude: 8.5417
    base_altitude: 408.0
    flight_altitude: 0.0
    flight_mode: "MANUAL"
    gps_satellites: 14
    simulate_gps_noise: true

tracker_node:
  ros__parameters:
    detections_topic: "/detections"
    target_error_topic: "/target_error"
    target_class: "person"
    min_confidence: 0.4
    detection_timeout: 2.0
    reacquisition_timeout: 5.0
    smoothing_alpha: 0.4
    target_area_min: 0.001
    target_area_max: 0.8
    publish_rate: 30.0
    proximity_threshold: 0.15

control_node:
  ros__parameters:
    target_error_topic: "/target_error"
    telemetry_topic: "/drone/telemetry"
    control_command_topic: "/control_command"
    autonomous_enabled: true     # safe to enable in sim

    gain_yaw: 1.0
    gain_down: 0.4
    gain_forward: 1.0
    gain_right: 1.0

    deadband_x: 0.03
    deadband_y: 0.03

    max_velocity_forward: 3.0
    max_velocity_right: 3.0
    max_velocity_down: 1.0
    max_yaw_rate: 1.5

    max_accel_forward: 2.0
    max_accel_right: 2.0
    max_accel_down: 1.0
    max_yaw_accel: 3.0

    min_battery_percent: 10.0    # sim batteries don't matter
    require_gps: false
    require_armed: false       # sim only: fake telemetry starts disarmed
    min_altitude_m: 0.0        # sim only: allow command math at ground altitude

    control_rate: 20.0
    target_timeout: 1.0
    telemetry_timeout: 2.0

visualizer_node:
  ros__parameters:
    image_topic: "/camera/image_raw"
    detections_topic: "/detections"
    target_error_topic: "/target_error"
    telemetry_topic: "/drone/telemetry"
    control_command_topic: "/control_command"
    window_name: "Drone Vision System (SIMULATION)"
    display_width: 960
    display_height: 720
    show_detections: true
    show_tracking: true
    show_telemetry: true
    show_control: true
    display_fps: 30.0
    headless: true

health_monitor_node:
  ros__parameters:
    image_topic: "/camera/image_raw"
    detections_topic: "/detections"
    target_error_topic: "/target_error"
    telemetry_topic: "/drone/telemetry"
    control_command_topic: "/control_command"
    heartbeat_period: 2.0
    stale_seconds: 2.0
